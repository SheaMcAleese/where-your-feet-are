<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#16140F">
  <title>Where Your Feet Are</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Onboarding Overlay -->
  <div id="onboarding" class="onboarding hidden"></div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-sheet" class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Celebration Overlay -->
  <div id="celebration" class="celebration hidden"></div>

  <!-- App Shell -->
  <div id="app" class="app hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">WHERE YOUR <span class="red">FEET</span> ARE</div>
      <div id="streak-pill" class="streak-pill">&#x1F525; <span id="streak-num">0</span></div>
    </header>

    <!-- Tab Panes -->
    <main class="main">
      <div id="tab-today" class="tab-pane active"></div>
      <div id="tab-week" class="tab-pane"></div>
      <div id="tab-journal" class="tab-pane"></div>
      <div id="tab-tools" class="tab-pane"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="nav">
      <button class="nav-btn active" data-tab="today">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-tab="week">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Week</span>
      </button>
      <button class="nav-btn" data-tab="journal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Journal</span>
      </button>
      <button class="nav-btn" data-tab="tools">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Tools</span>
      </button>
    </nav>
  </div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
  <script src="js/render.js"></script>
  <script src="js/modals.js"></script>
</body>
</html>
